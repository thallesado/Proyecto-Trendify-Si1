# Desarrollo local con un solo comando: docker compose up --build
# Frontend: http://127.0.0.1:5175  |  API directa: http://127.0.0.1:8001/api/

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cosmetica_sistema
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diego}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/02_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/db/03_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./backend/db/04_migracion_pago_cu09.sql:/docker-entrypoint-initdb.d/03_migracion_pago.sql:ro
      - ./backend/db/05_migracion_rol_cliente.sql:/docker-entrypoint-initdb.d/04_migracion_rol_cliente.sql:ro
      - ./backend/db/07_migracion_descripcion_usuario.sql:/docker-entrypoint-initdb.d/05_migracion_descripcion_usuario.sql:ro
      - ./backend/db/08_migracion_pedidos_guardados.sql:/docker-entrypoint-initdb.d/06_migracion_pedidos_guardados.sql:ro
      - ./backend/db/09_migracion_pago_transacciones.sql:/docker-entrypoint-initdb.d/07_migracion_pago_transacciones.sql:ro
      - ./backend/db/10_migracion_backfill_clientes_usuario.sql:/docker-entrypoint-initdb.d/08_migracion_backfill_clientes_usuario.sql:ro
    ports:
      # 5433 en el host evita choque con PostgreSQL local en 5432
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cosmetica_sistema"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-diego}@db:5432/cosmetica_sistema
      DEBUG: "True"
      SECRET_KEY: django-insecure-docker-dev-only
      ALLOWED_HOSTS: "*"
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-http://127.0.0.1:5175}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-bob}
    volumes:
      - ./backend:/app
    ports:
      # 8001 en el host evita choque con otros servicios en 8000 (p. ej. Laravel)
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5175:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
